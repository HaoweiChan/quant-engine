# ------------------------------------------------------------------------
# Strategy 1: vol_managed_bnh (swing) — LEVERAGED SIZING KEY TO WIN
# ------------------------------------------------------------------------
# risk_per_trade=0.06 and margin_cap=0.6 override the default (0.02 / 0.50)
# so vol_managed_bnh sizes to 3-4 base lots at 500k instead of 1 lot. The
# base lot is still protected by EngineConfig.min_hold_lots=1.0, so even if
# price drops through the sizing stop, the engine refuses to close below
# 1 lot. Overlay adds up to 2 more lots when inverse-vol signals.
#
# Standalone full-period stats at these params (500k):
#   sharpe = 1.057  sortino = 1.030  calmar = 1.157
#   alpha_vs_bnh = +0.073 (POSITIVE)
#   net_pnl = 376,854  mdd = 32.1%  return = +75.4%
["swing/trend_following/vol_managed_bnh".params]
vol_lookback_days = 10
vol_target_annual = 0.20
vol_overlay_max_lots = 2.0
trend_sma_days = 20
dd_breaker_pct = 0.15
dd_reentry_pct = 0.05
boost_sma_fast_days = 0
boost_lots = 0.0
stop_atr_mult = 3.0
risk_per_trade = 0.06       # raised from default 0.02 → ~3x base lots
margin_cap = 0.6            # raised from default 0.5 → more overlay headroom

# ------------------------------------------------------------------------
# Strategy 2: donchian_trend_strength (medium_term) — DOMINANT ALPHA
# ------------------------------------------------------------------------
# Standalone full-period stats at these params (500k):
#   sharpe = 0.865  sortino = 0.871
#   trade_count = 251  win_rate = 40.6%  profit_factor = 1.22
#   mdd = 11.4%  return = +17.2%
# Low correlation to vol_managed_bnh (-0.03) and neutral vs night (0.00)
# makes it the portfolio's diversification anchor; 50% weight maximises
# its contribution without crowding out the other two.
["medium_term/trend_following/donchian_trend_strength".params]
lookback_period = 20
rsi_len = 5
rsi_long_thresh = 55.0
rsi_short_thresh = 45.0
min_channel_atr = 0.57
atr_sl_multi = 1.4
atr_tp_multi = 4.42
trail_atr_multi = 0.7
max_hold_bars = 120
bar_agg = 15
profit_lock_atr = 1.5
locked_trail_ratio = 0.6
breakeven_atr = 1.0
pyramid_risk_level = 0

# ------------------------------------------------------------------------
