per_fold_is_weights_donch  = [0.50, 0.50, 0.50]
per_fold_is_weights_night  = [0.25, 0.25, 0.25]
per_fold_oos_sharpe        = [2.784, 3.754, 1.498]
per_fold_oos_mdd           = [0.028, 0.049, 0.076]
per_fold_oos_annual_return = [0.308, 0.532, 0.219]
gate_pass = true

[portfolio.weights_500k.vs_bnh]
