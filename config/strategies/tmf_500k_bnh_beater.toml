#   trade_count = 416  win_rate = 55.5%  profit_factor = 1.17
#   mdd = 20.4%  return = +26.0%
["short_term/trend_following/night_session_long".params]
entry_offset_min = 5
exit_before_close_min = 5
atr_sl_mult = 2.0
use_atr_filter = 0
atr_filter_mult = 2.0
use_trend_filter = 0
trend_ema_len = 20
trend_invert = 0
trail_enabled = 0
trail_trigger_atr = 1.0
trail_atr_mult = 1.5
or_confirm = 0
or_wait_min = 15
or_threshold_atr = 0.0
breakeven_enabled = 0
breakeven_trigger_atr = 1.0
tp_enabled = 0
tp_atr_mult = 2.0
momentum_filter = 0
mr_min_drop_atr = 0.0
rsi_filter_enabled = 0
rsi_max_entry = 70.0
rsi_period = 14
risk_per_trade = 0.06
pyramid_enabled = 1
pyramid_max_levels = 1
pyramid_trigger_atr = 1.0
pyramid_gamma = 0.5
pyramid_breakeven_on_add = 1

# ------------------------------------------------------------------------
# Deployment notes
# ------------------------------------------------------------------------
[deployment]
minimum_equity_twd = 500000
recommended_equity_twd = 500000  # higher tested; 500k is the sweet spot
live_sizing_mode = "RISK_STOP"
do_not_use_kelly_mode = "Under KELLY_PORTFOLIO with weights < 1.0, vol_managed_bnh's 3-4 native lots would multiply × 0.25 and floor to 0. Keep all three strategies at native sizing so the natural margin footprint matches the 25/50/25 return-attribution target."
live_monitoring = [
  "Daily slippage drag vs 0.1% baseline. De-weight if sustained > 0.03%/day for 20+ sessions.",
  "Realised inter-strategy correlation. vol↔donchian should stay near zero; donchian↔night near zero; vol↔night below 0.5. Re-run walk-forward if any pair crosses 0.5 for 20+ sessions.",
  "Per-strategy standalone Sharpe. Each strategy should maintain its standalone characteristics (vol ~1.06, donch ~0.87, night ~0.64). Investigate if any falls below its standalone Sharpe − 0.3 over a rolling 60-session window.",
  "MDD budget: 7.6% worst-fold target. Pause new entries if live MDD exceeds 12%.",
]
reoptimize_trigger = "Account equity crosses 2M NTD OR any monitoring rule fires for 20+ sessions."
