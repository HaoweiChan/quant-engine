name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/uv-action@v1
        with:
          enable-cache: true
      - run: uv run pytest tests/unit/ -m not integration -m not e2e -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: .coverage

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/uv-action@v1
        with:
          enable-cache: true
      - run: uv run pytest tests/integration/ -m not e2e -q

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/uv-action@v1
        with:
          enable-cache: true
      - run: uv run pytest tests/e2e/ -m e2e -q
